<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <!-- 网站图标外挂代码（同文件夹下） -->
<link rel="icon" type="image/x-icon" href="./favicon.ico">
<link rel="shortcut icon" type="image/x-icon" href="./favicon.ico">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title> free_nl </title>
    <style>
        /* 全局及重置 */
        :root {
            /* 统一的圆角度数 */
            --border-radius: 14px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
        }

        body {
            background-color: #fef8dd; /* 奶黄色背景 */
            color: #333;
            overflow-x: hidden;
            position: relative;
            min-height: 100vh;
        }

        /* 随机 Emoji 背景 */
        #emoji-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-around;
            align-content: space-around;
            overflow: hidden;
            opacity: 0.3; 
            pointer-events: none;
            font-size: 2.5rem;
        }

        /* 顶层容器：为了横屏双列加宽 */
        .container {
            max-width: 1000px;
            margin: 20px auto;
            padding: 25px;
            background: rgba(254, 248, 221, 0.85); 
            backdrop-filter: blur(12px); 
            -webkit-backdrop-filter: blur(12px);
            border-radius: var(--border-radius);
            box-shadow: 0 8px 32px rgba(210, 180, 140, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.5);
            z-index: 1;
            position: relative;
        }

        h1 {
            text-align: center;
            color: #d28c28;
            font-size: 1.8rem;
            margin-bottom: 25px;
            text-shadow: 1px 1px 2px rgba(255,255,255,0.8);
        }

        /* ============== 核心：响应式双列布局 ============== */
        .layout-wrapper {
            display: flex;
            flex-direction: column; /* 手机端默认竖排 */
            gap: 20px;
        }

        .left-panel {
            flex: 1;
        }

        .right-panel {
            flex: 1;
            display: none; /* 初始隐藏，计算后显示 */
        }

        @media (min-width: 800px) {
            .layout-wrapper {
                flex-direction: row; /* 电脑端横排（左中右） */
                align-items: flex-start; /* 顶部对齐 */
                gap: 30px;
            }
            .right-panel {
                /* 电脑端结果区域粘性定位，滚动左边时右边不动 */
                position: sticky;
                top: 20px; 
            }
        }
        /* =================================================== */

        /* 表单网格 */
        .form-grid {
            display: grid;
            grid-template-columns: 1fr; 
            gap: 18px;
        }

        /* 表单输入框 */
        .input-group {
            display: flex;
            flex-direction: column;
        }

        .input-group label {
            font-size: 0.95rem;
            font-weight: 600;
            color: #a67323;
            margin-bottom: 8px;
        }

        .input-group input, .input-group select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #f2da91;
            border-radius: var(--border-radius);
            background-color: rgba(255, 255, 255, 0.9);
            font-size: 1rem;
            color: #333;
            transition: all 0.3s ease;
            outline: none;
        }

        .input-group input:focus, .input-group select:focus {
            border-color: #d28c28;
            box-shadow: 0 0 8px rgba(210, 140, 40, 0.2);
        }

        /* 快捷选择按钮网格 */
        .quick-options {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(65px, 1fr));
            gap: 8px;
            margin-bottom: 10px;
        }

        .btn-opt {
            padding: 10px 5px;
            border: 2px solid #f2da91;
            border-radius: var(--border-radius);
            background: rgba(255, 255, 255, 0.8);
            color: #a67323;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s ease;
            text-align: center;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* 激活状态 */
        .btn-opt.active {
            background: linear-gradient(135deg, #fbdb73, #f5c04f);
            color: #8c5a12;
            border-color: #d28c28;
            box-shadow: 0 2px 6px rgba(210, 140, 40, 0.3);
        }

        .btn-opt:active {
            transform: scale(0.95);
        }

        /* 主计算按钮 */
        .submit-btn {
            width: 100%;
            padding: 15px;
            margin-top: 25px;
            background: linear-gradient(135deg, #fbdb73, #f5c04f);
            color: #8c5a12;
            border: none;
            border-radius: var(--border-radius);
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(245, 192, 79, 0.4);
            transition: all 0.1s ease;
        }

        .submit-btn:active {
            transform: scale(0.97);
            box-shadow: 0 2px 5px rgba(245, 192, 79, 0.4);
            background: linear-gradient(135deg, #f5c04f, #fbdb73);
        }

        /* 结果展示卡片 */
        .result-card {
            background: #fff;
            padding: 20px;
            border-radius: var(--border-radius);
            border: 2px dashed #f2da91;
            margin-bottom: 15px;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-card h3 {
            color: #d28c28;
            margin-bottom: 15px;
            font-size: 1.2rem;
            border-bottom: 2px solid #fef8dd;
            padding-bottom: 8px;
        }

        /* 表格样式 */
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.95rem;
        }

        table, th, td {
            border: 1px solid #f2da91;
        }

        th, td {
            padding: 10px;
            text-align: left;
        }

        th {
            background-color: #fef8dd;
            color: #a67323;
            width: 45%;
        }

        td {
            font-family: monospace;
            font-size: 1.05rem;
        }

        .highlight-row {
            background-color: #fff9e6;
            font-weight: bold;
            color: #d22828;
        }

        .green-text { color: #2e7d32; font-weight:bold; }
        .red-text { color: #c62828; font-weight:bold; }
        .warning-text { color: #ef6c00; font-weight:bold; }

        .risk-item { margin-bottom: 5px; font-weight: 500; }
    </style>
</head>
<body>

    <div id="emoji-bg"></div>

    <div class="container">
        <h1>自由奶龙_仓位计算器</h1>
        
        <div class="layout-wrapper">
            <div class="left-panel">
                <form id="calc-form">
                    <div class="form-grid">
                        
                        <div class="input-group">
                            <label>标的 / 币种</label>
                            <div class="quick-options" id="coin-options">
                                <div class="btn-opt active" onclick="selectOpt('coin', 'BTC', this)">BTC</div>
                                <div class="btn-opt" onclick="selectOpt('coin', 'ETH', this)">ETH</div>
                                <div class="btn-opt" onclick="selectOpt('coin', 'SOL', this)">SOL</div>
                                <div class="btn-opt" onclick="selectOpt('coin', '其他', this)">其他</div>
                            </div>
                            <input type="text" id="coin" value="BTC" placeholder="可留空，或输入币种名称如 DOGE">
                        </div>

                        <div class="input-group">
                            <label>交易所</label>
                            <select id="exchange">
                                <option value="OKX" selected>OKX</option>
                                <option value="Binance">Binance</option>
                                <option value="Bitget">Bitget</option>
                                <option value="Bybit">Bybit</option>
                                <option value="Hyperliquid">Hyperliquid</option>
                            </select>
                        </div>
                        
                        <div class="input-group">
                            <label>账户总额 (USDT)</label>
                            <input type="number" id="balance" step="any" placeholder="例如：10000" required>
                        </div>

                        <div class="input-group">
                            <label>杠杆倍数</label>
                            <div class="quick-options" id="leverage-options">
                                <div class="btn-opt active" onclick="selectOpt('leverage', '1', this)">现货</div>
                                <div class="btn-opt" onclick="selectOpt('leverage', '3', this)">3x</div>
                                <div class="btn-opt" onclick="selectOpt('leverage', '5', this)">5x</div>
                                <div class="btn-opt" onclick="selectOpt('leverage', '10', this)">10x</div>
                                <div class="btn-opt" onclick="selectOpt('leverage', '20', this)">20x</div>
                            </div>
                            <input type="number" id="leverage" value="1" step="any" placeholder="自定义倍数，如 8">
                        </div>

                        <div class="input-group">
                            <label>止损后亏本金的比例 (%)</label>
                            <div class="quick-options" id="risk-options">
                                <div class="btn-opt" onclick="selectOpt('risk', '0.5', this)">0.5%</div>
                                <div class="btn-opt active" onclick="selectOpt('risk', '1', this)">1%</div>
                                <div class="btn-opt" onclick="selectOpt('risk', '2', this)">2%</div>
                                <div class="btn-opt" onclick="selectOpt('risk', '3', this)">3%</div>
                            </div>
                            <input type="number" id="risk" value="1" step="any" placeholder="自定义比例，如 1.5">
                        </div>

                        <div class="input-group">
                            <label>开仓价格</label>
                            <input type="number" id="entry" step="any" required>
                        </div>
                        <div class="input-group">
                            <label>止损价格</label>
                            <input type="number" id="sl" step="any" required>
                        </div>
                        <div class="input-group">
                            <label>止盈价格</label>
                            <input type="number" id="tp" step="any" required>
                        </div>
                    </div>
                    
                    <button class="submit-btn" type="button" onclick="calculate()">一键计算仓位</button>
                </form>
            </div>

            <div class="right-panel" id="result-panel">
                <div class="result-card" id="main-result"></div>
                <div class="result-card" id="risk-result"></div>
            </div>
        </div>
    </div>

    <script>
        // 背景Emoji生成逻辑
        const emojis = ['😂', '🍎', '💣', '😍', '😭', '🤪', '🤡', '🤔', '😋', '🥰', '😆', '🍉', '🍌', '🔥', '✨', '👀'];
        const bgContainer = document.getElementById('emoji-bg');
        const emojiCount = Math.floor((window.innerWidth * window.innerHeight) / 10000); 
        
        for(let i=0; i<emojiCount; i++) {
            const span = document.createElement('span');
            span.innerText = emojis[Math.floor(Math.random() * emojis.length)];
            span.style.transform = `rotate(${Math.random() * 360}deg)`;
            span.style.margin = `${Math.random() * 20}px`;
            span.style.opacity = (Math.random() * 0.5 + 0.3).toFixed(1);
            bgContainer.appendChild(span);
        }

        // 快捷选项点击逻辑
        function selectOpt(targetId, value, btnEl) {
            const inputEl = document.getElementById(targetId);
            // 如果点击的是币种的“其他”，清空输入框并聚焦
            if (targetId === 'coin' && value === '其他') {
                inputEl.value = '';
                inputEl.focus();
            } else {
                inputEl.value = value;
            }
            
            const parent = btnEl.parentElement;
            const buttons = parent.querySelectorAll('.btn-opt');
            buttons.forEach(b => b.classList.remove('active'));
            btnEl.classList.add('active');
        }

        // 手动输入联动快捷按钮高亮
        ['coin', 'leverage', 'risk'].forEach(id => {
            document.getElementById(id).addEventListener('input', function() {
                const opts = document.getElementById(id + '-options').querySelectorAll('.btn-opt');
                opts.forEach(b => b.classList.remove('active'));
                
                let val = this.value.toUpperCase().trim();
                let matched = false;

                opts.forEach(b => {
                    let bVal = b.innerText.replace('x','').replace('%','').trim().toUpperCase();
                    if(bVal === '现货') bVal = '1';
                    
                    if (id === 'coin' && bVal === '其他') {
                        // "其他"按钮不参与直接字符匹配
                    } else if (bVal === val) {
                        b.classList.add('active');
                        matched = true;
                    }
                });

                // 填写非三大主流币，且输入框不为空，自动跳到“其他”高亮
                if (id === 'coin' && !matched && val !== '') {
                    opts[opts.length - 1].classList.add('active');
                } else if (id === 'coin' && val === '') {
                    opts[opts.length - 1].classList.add('active');
                }
            });
        });

        // 费率配置
        const feeConfig = {
            'Binance': { spot: 0.00100, contract: 0.00050 },
            'OKX': { spot: 0.00100, contract: 0.00050 },
            'Bitget': { spot: 0.00100, contract: 0.00060 },
            'Bybit': { spot: 0.00100, contract: 0.00055 },
            'Hyperliquid': { spot: 0.00070, contract: 0.00045 }
        };

        function calculate() {
            const ex = document.getElementById('exchange').value;
            const coinRaw = document.getElementById('coin').value.trim();
            const balance = parseFloat(document.getElementById('balance').value);
            const riskPercent = parseFloat(document.getElementById('risk').value) || 1;
            const entry = parseFloat(document.getElementById('entry').value);
            const sl = parseFloat(document.getElementById('sl').value);
            const tp = parseFloat(document.getElementById('tp').value);
            const leverage = parseFloat(document.getElementById('leverage').value) || 1;

            if(!balance || !entry || !sl || !tp) {
                alert("请填写完整：账户总额、开仓、止损、止盈价格！");
                return;
            }
            if(sl === entry) {
                alert("止损价格不能等于开仓价格！");
                return;
            }

            const isLong = sl < entry;
            const directionText = isLong ? "做多 ▲" : "做空 ▼";
            const isContract = leverage > 1;
            const typeText = isContract ? "合约" : "现货";

            const feeData = feeConfig[ex];
            const feeRate = isContract ? feeData.contract : feeData.spot;

            let slDistance = isLong ? (entry - sl) / entry : (sl - entry) / entry;
            const maxLoss = balance * (riskPercent / 100);
            const feeCost = feeRate * 2;
            const actualSlCost = slDistance + feeCost;
            const position = maxLoss / actualSlCost;
            const margin = position / leverage;
            const qty = position / entry;
            let tpDistance = isLong ? (tp - entry) / entry : (entry - tp) / entry;
            const expectedProfit = (position * tpDistance) - (position * feeRate * 2);
            const rrRatio = expectedProfit / maxLoss;
            const marginRatio = margin / balance;

            // 精度格式化
            const p4 = (num) => (num * 100).toFixed(4); 
            const f2 = (num) => num.toFixed(2); 
            const fQty = (num) => { 
                const c = coinRaw.toUpperCase();
                if(c.includes('BTC')) return num.toFixed(4);
                if(c.includes('ETH')) return num.toFixed(3);
                return num.toFixed(2);
            };

            const coinDisplay = coinRaw ? coinRaw.toUpperCase() : '未命名标的';
            const coinSuffix = coinRaw ? coinRaw.toUpperCase() : '';

            // 显示右侧结果面板
            const resultPanel = document.getElementById('result-panel');
            resultPanel.style.display = 'block';

            // 1. 基础信息渲染
            document.getElementById('main-result').innerHTML = `
                <h3>仓位计算结果</h3>
                <p style="margin-bottom:12px; font-size:1rem;">
                    方向：<span class="${isLong ? 'green-text' : 'red-text'}">${directionText}</span> | 
                    标的：<b>${coinDisplay}</b> | 
                    交易所：<b>${ex}</b>（${typeText} Taker费率 ${p4(feeRate/100)}%）
                </p>
                <table>
                    <tr><th>账户总额</th><td>${f2(balance)} USDT</td></tr>
                    <tr><th>止损后亏本金的</th><td class="red-text">${riskPercent}%（最多亏 ${f2(maxLoss)} USDT）</td></tr>
                    <tr><th>开仓价格</th><td>${entry}</td></tr>
                    <tr><th>止损价格</th><td>${sl}</td></tr>
                    <tr><th>止盈价格</th><td>${tp}</td></tr>
                    <tr><th>止损距离</th><td>${p4(slDistance)}%</td></tr>
                    <tr><th>手续费（双边）</th><td>${p4(feeCost)}%</td></tr>
                    <tr><th>实际止损成本</th><td>${p4(actualSlCost)}%</td></tr>
                    <tr><th>杠杆倍数</th><td>${leverage}x</td></tr>
                    <tr class="highlight-row"><th>名义仓位（开多大的单）</th><td>${f2(position)} USDT</td></tr>
                    <tr class="highlight-row"><th>保证金（占用多少钱）</th><td>${f2(margin)} USDT</td></tr>
                    <tr class="highlight-row"><th>可买入数量</th><td>${fQty(qty)} ${coinSuffix}</td></tr>
                    <tr><th>预期盈利</th><td><span class="green-text">+${f2(expectedProfit)} USDT</span></td></tr>
                    <tr class="highlight-row"><th>盈亏比</th><td>${rrRatio.toFixed(1)} : 1</td></tr>
                    <tr><th>保证金占比</th><td>${p4(marginRatio)}%</td></tr>
                </table>
            `;

            // 2. 风险检查渲染
            let riskMsgs = [];
            if(margin > balance) { riskMsgs.push('❌ 保证金超出账户余额，无法开仓。请减小仓位或降低杠杆。'); }
            if(margin > balance * 0.3) { riskMsgs.push('⚠️ 保证金占比超30%，仓位偏重，注意集中度风险。'); }
            if(rrRatio < 1) { riskMsgs.push('⚠️ 盈亏比不足1:1，收益不覆盖风险，建议调整止盈止损位。'); }
            if(slDistance < feeCost) { riskMsgs.push('❌ 止损距离小于手续费成本，不管涨跌都亏，请扩大止损。'); }
            if(leverage > 20) { riskMsgs.push('⚠️ 高杠杆交易，极端行情下可能被强平，确认你能承受。'); }
            if((isLong && sl > entry) || (!isLong && sl < entry)) { riskMsgs.push('❌ 止损方向错误，请检查输入。'); }

            let riskHtml = '<h3>风险检查</h3>';
            if(riskMsgs.length === 0) {
                riskHtml += '<div class="risk-item green-text">✅ 所有风险检查通过</div>';
            } else {
                riskMsgs.forEach(msg => {
                    riskHtml += `<div class="risk-item ${msg.startsWith('❌') ? 'red-text' : 'warning-text'}">${msg}</div>`;
                });
            }
            document.getElementById('risk-result').innerHTML = riskHtml;

            // 在手机端计算后自动滚动到结果区域；电脑端由于在右侧直接显示，不需要大幅度滚动
            if(window.innerWidth < 800) {
                resultPanel.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
        }
    </script>
</body>
</html>
